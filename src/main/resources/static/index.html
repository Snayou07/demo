<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Live Football</title>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;justify-content:center;padding:3rem 1rem}
        .card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:2rem;width:100%;max-width:360px}
        .match-header{font-size:13px;color:#999;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:0.5rem}
        .score{font-size:48px;font-weight:500;color:#111;line-height:1;margin-bottom:0.25rem}
        .meta{font-size:13px;color:#999;margin-bottom:2rem}
        hr{border:none;border-top:1px solid #f0f0f0;margin:1.5rem 0}
        button{display:block;width:100%;padding:9px 14px;margin-bottom:8px;background:transparent;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;color:#111;cursor:pointer;text-align:left}
        button:hover{background:#fafafa}
        button:last-of-type{margin-bottom:0;color:#c0392b;border-color:#f5c6c6}
        #status{margin-top:1rem;font-size:12px;color:#999;min-height:16px}
        #user-panel{margin-top:1rem;font-size:12px;color:#555;line-height:1.6;display:none;border-top:1px solid #f0f0f0;padding-top:1rem}
    </style>
</head>
<body>
<div class="card">
    <p class="match-header" id="teams">Waiting for match...</p>
    <div class="score" id="score">0:0</div>
    <p class="meta">Minute: <span id="minute">0</span>' &nbsp;·&nbsp; <span id="event">–</span></p>

    <hr>

    <button onclick="loginWithOidc()">Login via Casdoor</button>
    <button onclick="fetchAndSaveToken()">Save token to cookie</button>
    <button onclick="fetchUserInfo()">Get user info</button>
    <button onclick="logout()">Logout</button>

    <div id="status"></div>
    <div id="user-panel"></div>
</div>

<script>
    function loginWithOidc() {
      window.location.href = '/auth/login';
    }

    async function fetchAndSaveToken() {
      try {
        const res = await fetch('/api/token', { headers: { 'Accept': 'application/json' } });
        if (res.status === 401) { setStatus('Not authenticated. Please login first.'); return; }
        const data = await res.json();
        const exp = new Date(Date.now() + 3600000).toUTCString();
        document.cookie = `access_token=${data.access_token}; Secure; SameSite=Strict; path=/; expires=${exp}`;
        setStatus('Token saved to cookie.');
      } catch (e) { setStatus('Error: ' + e.message); }
    }

    async function fetchUserInfo() {
      try {
        const res = await fetch('/user-info', { headers: { 'Accept': 'application/json' } });
        if (res.status === 401) { setStatus('Not authenticated. Please login first.'); return; }
        const data = await res.json();
        const panel = document.getElementById('user-panel');
        panel.style.display = 'block';
        panel.innerHTML = Object.entries(data).map(([k, v]) => `<b>${k}</b>: ${JSON.stringify(v)}`).join('<br>');
        setStatus('User info loaded.');
      } catch (e) { setStatus('Error: ' + e.message); }
    }

    function logout() {
      document.cookie = 'access_token=; Secure; SameSite=Strict; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
      window.location.href = '/logout';
    }

    function setStatus(msg) { document.getElementById('status').innerText = msg; }

    protobuf.load('/match.proto', function(err, root) {
      if (err) { console.error(err); return; }
      const MatchUpdate = root.lookupType('com.example.demo.MatchUpdate');
      const MatchSubscription = root.lookupType('com.example.demo.MatchSubscription');
      const socket = new WebSocket('wss://' + window.location.host + '/ws/football');
      socket.binaryType = 'arraybuffer';
      socket.onopen = function() {
        socket.send(MatchSubscription.encode(MatchSubscription.create({ matchId: 'real-barca' })).finish());
      };
      socket.onmessage = function(e) {
        const m = MatchUpdate.decode(new Uint8Array(e.data));
        document.getElementById('teams').innerText = m.homeTeam + ' vs ' + m.awayTeam;
        document.getElementById('score').innerText = m.score;
        document.getElementById('minute').innerText = m.minute;
        document.getElementById('event').innerText = m.event;
      };
      socket.onerror = function(e) { console.error('WebSocket error:', e); };
    });
</script>
</body>
</html>
