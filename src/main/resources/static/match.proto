syntax = "proto3";
package com.example.demo; // Адаптовано під твій пакет

option java_package = "com.example.demo.proto";
option java_multiple_files = true;

message MatchUpdate {
  string matchId = 1;
  string homeTeam = 2;
  string awayTeam = 3;
  string score = 4;
  int32 minute = 5;
  string event = 6;
}

message MatchSubscription {
  string matchId = 1;
}